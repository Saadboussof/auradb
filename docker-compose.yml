version: '3.8'

services:
  # ────────────────────────────────────────────────────────
  # 1. OUR SPRING BOOT SERVICES
  # ────────────────────────────────────────────────────────
  control-plane:
    build:
      context: .
      dockerfile: auradb-control-plane/Dockerfile
    container_name: auradb-control-plane
    ports:
      - "8081:8081"
    # Ensure infrastructure is up before starting the API
    depends_on:
      - redis
      - postgres

  # ────────────────────────────────────────────────────────
  # 2. INFRASTRUCTURE BACKING SERVICES
  # ────────────────────────────────────────────────────────
  
  # Redis for Dynamic Route Caching
  redis:
    image: redis:7-alpine
    container_name: auradb-redis
    ports:
      - "6379:6379"

  # PostgreSQL for Tenant Metadata Storage
  postgres:
    image: postgres:16-alpine
    container_name: auradb-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: auradb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Zookeeper (Required by Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: auradb-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # Kafka (Event-Driven Telemetry and Alerts)
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: auradb-kafka
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

volumes:
  postgres_data:
